<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiamanteBot - Painel Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="chatContainer" style="width: 95%; max-width: 950px; display: flex; flex-direction: column; gap: 15px;">
        
        <!-- Cabeçalho com Foto Clicável do Bot e Status Dinâmico -->
        <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #333;">
            <div style="display: flex; align-items: center;">
                <img id="botAvatar" src="https://placehold.co" style="border-radius: 50%; margin-right: 10px; width: 40px; height: 40px; border: 2px solid var(--accent-color); cursor: pointer;" title="Clique para mudar a foto do Bot" onclick="document.getElementById('avatarInput').click()">
                <h3 style="margin: 0; font-size: 16px;">DiamanteBot Chat</h3>
            </div>
            <div>
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText" style="font-size: 14px; font-weight: 500;">Verificando...</span>
            </div>
        </div>

        <!-- Área de Conteúdo Principal (Três Colunas Responsivas) -->
        <div style="display: flex; gap: 15px; flex-wrap: wrap; text-align: left;">
            
            <!-- Coluna Esquerda: Arquivos e Comandos Rápidos -->
            <div style="flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 15px;">
                
                <!-- 📁 GERENCIADOR DE ARQUIVOS REAL -->
                <div style="background: #0c1017; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <span style="color: var(--accent-color); font-weight: bold; font-size: 13px;">📁 Arquivos (IA)</span>
                        <button onclick="carregarArquivos()" style="width: auto; margin: 0; padding: 4px 8px; font-size: 11px;">🔄 Atualizar</button>
                    </div>
                    <div id="listaArquivos" style="font-size: 13px; color: #aaa; overflow-y: auto; max-height: 160px; display: flex; flex-direction: column; gap: 4px;">
                        Buscando arquivos...
                    </div>
                </div>

                <!-- 🎛️ PAINEL DE COMANDOS RÁPIDOS -->
                <div style="background: #0c1017; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05);">
                    <span style="color: var(--accent-color); font-weight: bold; font-size: 13px; display: block; margin-bottom: 10px;">🎛️ Controle</span>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="comandoRapido('reiniciar')" style="padding: 8px; font-size: 11px; border-color: #f39c12; color: #f39c12;">🛑 Reiniciar</button>
                        <button onclick="comandoRapido('limpar-cache')" style="padding: 8px; font-size: 11px; border-color: var(--danger); color: var(--danger);">🧹 Limpar Cache</button>
                    </div>
                </div>

                <!-- 📊 MONITOR: STATUS DO MORADOR -->
                <div style="background: #0c1017; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05);">
                    <span style="color: var(--accent-color); font-weight: bold; font-size: 13px; display: block; margin-bottom: 8px;">📊 Status do Morador (Rede)</span>
                    <div style="font-size: 11px; display: flex; flex-direction: column; gap: 5px;">
                        <div><strong>Destino:</strong> <span id="netTarget" style="color: #aaa; word-break: break-all;">Aguardando...</span></div>
                        <div><strong>Último Status:</strong> <span id="netStatus" style="color: #aaa;">Nenhum</span></div>
                        <div><strong>Chave Gemini:</strong> <span id="netKeyIndex" style="color: #aaa;">Index: 0</span></div>
                    </div>
                </div>

            </div>

            <!-- Coluna Direita: Janela de Chat e Terminal -->
            <div style="flex: 2; min-width: 320px; display: flex; flex-direction: column; gap: 10px;">
                
                <!-- Caixa de Chat Multimídia -->
                <div class="chat-box" id="chatBox" style="height: 260px; background-size: cover; background-position: center;"></div>
                
                <!-- Campo de Entrada de Mensagens -->
                <div class="chat-input-area">
                    <input type="text" id="msgInput" placeholder="Digite uma mensagem...">
                    <input type="file" id="mediaInput" style="display: none;" onchange="atualizarBotaoMidia()">
                    <button id="clipBtn" onclick="document.getElementById('mediaInput').click()" style="width: auto; margin: 0; padding: 12px;">Anexar 📎</button>
                    <button id="sendBtn" style="width: auto; margin: 0; padding: 12px 20px;">Enviar</button>
                </div>
                <div id="nomeArquivoAnexo" style="font-size: 11px; color: var(--accent-color); margin-top: -5px; padding-left: 5px;"></div>

                <!-- 📟 MINI TERMINAL DE LOGS AO VIVO -->
                <div>
                    <span style="font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 2px;">📟 TERMINAL DE EVENTOS DA NUVEM</span>
                    <div class="terminal-console" id="terminalConsole">
                        [Dashboard]: Sistema pronto.
                    </div>
                </div>

            </div>

        </div>

        <!-- Rodapé de Configuração Visual e Histórico -->
        <div style="padding-top: 10px; border-top: 1px solid #333; display: flex; gap: 15px; font-size: 12px; justify-content: space-between; flex-wrap: wrap;">
            <div style="display: flex; gap: 12px;">
                <label style="cursor:pointer; color: var(--accent-color)">🖼️ Mudar Wallpaper
                    <input type="file" id="bgInput" accept="image/*" style="display:none;" onchange="changeBg(this)">
                </label>
                <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="changeAvatar(this)">
            </div>
            <span style="cursor:pointer; color: #fff;" onclick="downloadLogs()">📥 Baixar Histórico (.json)</span>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const mediaInput = document.getElementById('mediaInput');
        const sendBtn = document.getElementById('sendBtn');
        const listaArquivos = document.getElementById('listaArquivos');
        const nomeArquivoAnexo = document.getElementById('nomeArquivoAnexo');
        const terminalConsole = document.getElementById('terminalConsole');
        
        const netTarget = document.getElementById('netTarget');
        const netStatus = document.getElementById('netStatus');
        const netKeyIndex = document.getElementById('netKeyIndex');
        
        let history = [];

        function addTerminalLog(message) {
            const time = new Date().toLocaleTimeString();
            terminalConsole.innerHTML += `<br><span style="color:#888;">[${time}]</span> ${message}`;
            terminalConsole.scrollTop = terminalConsole.scrollHeight;
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/engine/status');
                const data = await res.json();
                
                netTarget.innerText = data.iaCloudUrl || "Local/Embutido";
                netKeyIndex.innerText = `Index ativo: ${data.chaveAtivaIndex}`;

                if(data.status === 'online') {
                    document.getElementById('statusDot').className = 'status-dot status-online';
                    document.getElementById('statusText').innerText = 'Bot Online';
                    document.getElementById('statusText').style.color = 'var(--success)';
                } else {
                    document.getElementById('statusDot').className = 'status-dot';
                    document.getElementById('statusText').innerText = 'Bot Offline';
                    document.getElementById('statusText').style.color = '#8a99ad';
                }
            } catch(e) {
                document.getElementById('statusText').innerText = 'Erro Conexão';
            }
        }

        async function carregarArquivos() {
            listaArquivos.innerHTML = "Buscando...";
            try {
                const res = await fetch('/api/dashboard/arquivos');
                const dados = await res.json();
                
                if (dados.error) {
                    listaArquivos.innerHTML = `<span style='color:var(--danger);'>${dados.message}</span>`;
                    return;
                }

                const arquivos = Array.isArray(dados) ? dados : (dados.arquivos || dados.files || []);

                if(arquivos.length === 0) {
                    listaArquivos.innerHTML = "<span style='color:#555;'>Nenhum arquivo no servidor.</span>";
                    return;
                }

                listaArquivos.innerHTML = "";
                arquivos.forEach((nome) => {
                    const row = document.createElement('div');
                    row.className = 'file-row';
                    row.innerHTML = `
                        <span style="color:#eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;" title="${nome}">📄 ${nome}</span>
                        <button class="btn-delete-file" onclick="deletarArquivo('${nome}')">❌</button>
                    `;
                    listaArquivos.appendChild(row);
                });
            } catch (error) {
                listaArquivos.innerHTML = "<span style='color:var(--danger);'>Erro ao ler arquivos.</span>";
            }
        }

        async function deletarArquivo(nome) {
            if(!confirm(`Deseja realmente apagar fisicamente o arquivo "${nome}" do servidor?`)) return;
            addTerminalLog(`Removendo arquivo fisicamente: ${nome}...`);
            try {
                const res = await fetch(`/api/dashboard/arquivos/deletar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: nome })
                });
                const data = await res.json();
                if(data.success) {
                    addTerminalLog(`Sucesso: ${nome} deletado do disco.`);
                    carregarArquivos();
                } else {
                    addTerminalLog(`Erro ao deletar: ${data.message}`);
                }
            } catch (e) {
                addTerminalLog(`Erro na requisição de exclusão.`);
            }
        }

        async function comandoRapido(tipo) {
            addTerminalLog(`Comando enviado: ${tipo.toUpperCase()}`);
            try {
                const res = await fetch(`/api/engine/comando`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comando: tipo })
                });
                const data = await res.json();
                addTerminalLog(`[Servidor]: ${data.message}`);
                checkStatus();
            } catch (e) {
                addTerminalLog(`[Erro]: Falha ao processar comando.`);
            }
        }

        function atualizarBotaoMidia() {
            if(mediaInput.files.length > 0) {
                nomeArquivoAnexo.innerText = `📎 Pronto para envio: ${mediaInput.files[0].name}`;
                document.getElementById('clipBtn').style.borderColor = "var(--success)";
            } else {
                nomeArquivoAnexo.innerText = "";
            }
        }

        async function appendMessage(sender, text, fileObj = null) {
            const msgDiv = document.createElement('div');
            msgDiv.style.margin = '10px 0';
            
            let conteudoMidia = "";
            
            if (fileObj) {
                const urlMidia = URL.createObjectURL(fileObj);
                if (fileObj.type.startsWith('image/')) {
                    conteudoMidia = `<br><img src="${urlMidia}" style="max-width: 100%; max-height: 160px; border-radius: 8px; margin-top: 5px; border: 1px solid #222;">`;
                } else if (fileObj.type.startsWith('video/')) {
                    conteudoMidia = `<br><video src="${urlMidia}" controls style="max-width: 100%; max-height: 160px; border-radius: 8px; margin-top: 5px;"></video>`;
                } else if (fileObj.type.startsWith('audio/')) {
                    conteudoMidia = `<br><audio src="${urlMidia}" controls style="margin-top: 5px; width:100%;"></audio>`;
                } else {
                    conteudoMidia = `<br><a href="${urlMidia}" download="${fileObj.name}" style="color:var(--accent-color); font-size:12px; display:inline-block; margin-top:5px;">📥 Documento: ${fileObj.name}</a>`;
                }
            }

            msgDiv.innerHTML = `<strong style="color:var(--accent-color)">${sender}:</strong> <span style="color:#fff">${text}</span>${conteudoMidia}`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            history.push({ sender, text, time: new Date() });
        }

        async function sendMessage() {
            const text = msgInput.value;
            const file = mediaInput.files[0];
            if (!text && !file) return;

            const formData = new FormData();
            if (text) formData.append('message', text);
            if (file) formData.append('media', file);

            appendMessage('Você', text || `[Enviou o arquivo: ${file.name}]`, file);
            
            msgInput.value = '';
            mediaInput.value = '';
            nomeArquivoAnexo.innerText = "";
            document.getElementById('clipBtn').style.borderColor = "var(--accent-color)";

            addTerminalLog(`Iniciando transmissão (Handshake & Retries ativos)...`);

            try {
                sendBtn.disabled = true;
                const response = await fetch('/api/chat', { method: 'POST', body: formData });
                const data = await response.json();
                
                netStatus.innerText = `Code: ${response.status} OK`;
                netStatus.style.color = "var(--success)";

                if (data.error) {
                    appendMessage('Sistema', `Erro: ${data.message}`);
                    addTerminalLog(`[Falha]: ${data.message}`);
                } else {
                    appendMessage('DiamanteBot', data.text);
                    addTerminalLog(`Resposta processada e exibida com sucesso.`);
                }
            } catch (e) {
                netStatus.innerText = "HTTP/Fetch Timeout";
                netStatus.style.color = "var(--danger)";
                appendMessage('Sistema', 'Falha crítica ao contatar o Morador IA após retries.');
                addTerminalLog(`[Erro Crítico]: Timeout ou indisponibilidade de rede.`);
            } finally {
                sendBtn.disabled = false;
                checkStatus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        function changeBg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('chatBox').style.backgroundImage = `url(${e.target.result})`;
                    addTerminalLog(`Papel de parede atualizado.`);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function changeAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('botAvatar').src = e.target.result;
                    addTerminalLog(`Foto do perfil do bot alterada.`);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadLogs() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(history, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "diamantebot_logs.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            addTerminalLog(`Logs baixados com sucesso.`);
        }

        setInterval(checkStatus, 7000);
        checkStatus();
        setTimeout(carregarArquivos, 1500);
    </script>
</body>
</html>
