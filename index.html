<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiamanteBot Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; height: 100vh; display: flex; flex-direction: column; color: #333; }
        .header { background: #007bff; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .control-panel { padding: 15px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-play { background: #28a745; color: white; width: 100%; font-size: 16px; }
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; background: #efeae2; }
        .footer { padding: 12px; background: white; display: flex; align-items: center; gap: 8px; border-top: 1px solid #e0e0e0; }
        .btn-icon { background: #f0f2f5; padding: 10px; border-radius: 50%; width: 45px; height: 45px; }
    </style>
</head>
<body>
    <div class="header"><span>💎 <b>DiamanteBot Dashboard</b></span></div>
    
    <div class="control-panel">
        <div style="display: flex; gap: 8px;">
            <input type="text" id="dirInput" placeholder="Nome do Projeto">
            <button class="btn-primary" onclick="selecionarProjeto()">OK</button>
        </div>
        <button class="btn-play" onclick="iniciarMotor()">▶️ INICIAR MOTOR</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="msg system">Painel pronto. Selecione o projeto e inicie.</div>
    </div>

    <div class="footer">
        <input type="file" id="fileInput" style="display:none" onchange="uploadProjeto()">
        <button class="btn-icon" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="chatInput" placeholder="Mensagem...">
        <button class="btn-icon" onclick="enviarMensagem()" style="background: #007bff; color: white;">➤</button>
    </div>

    <script>
        // Funções que conversam diretamente com o seu app.js
        async function selecionarProjeto() {
            const nome = document.getElementById('dirInput').value;
            const res = await fetch('/selecionar-projeto', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome }) 
            });
            const data = await res.json();
            alert(data.msg);
        }

        async function iniciarMotor() {
            const res = await fetch('/iniciar-motor', { method: 'POST' });
            const data = await res.json();
            alert(data.msg);
        }

        async function uploadProjeto() {
            const file = document.getElementById('fileInput').files[0];
            const formData = new FormData();
            formData.append('arquivoZip', file);
            const res = await fetch('/upload-projeto', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.msg);
        }
    </script>
</body>
</html>
